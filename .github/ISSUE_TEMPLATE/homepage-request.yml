name: Homepage change request
description: Request a change for the Sechan Oh GitHub Pages homepage.
title: "[Homepage] "
labels: ["codex-homepage"]
body:
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - Visual design
        - Content
        - Mobile context
        - Deployment
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the homepage change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List what must be true when the change is done.
    validations:
      required: true
